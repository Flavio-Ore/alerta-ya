apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: alertaya-api
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    spec:
      containers:
      # Container 1: The Express API Backend
      - name: alertaya-api-1
        image: us-central1-docker.pkg.dev/alertaya-1b963/cloud-run-source-deploy/alertaya-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: NODE_ENV
          value: production
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: alertaya-db-url
              key: latest
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: alertaya-jwt-secret
              key: latest
        - name: JOB_SECRET
          valueFrom:
            secretKeyRef:
              name: alertaya-job-secret
              key: latest
        - name: ML_SERVICE_URL
          value: https://alertaya-ml-562740646244.us-central1.run.app
        - name: WEB_URL
          value: https://alertaya-web-562740646244.us-central1.run.app
        - name: REDIS_URL
          value: redis://localhost:6379
        - name: KMS_PROJECT_ID
          value: alertaya-1b963
        - name: FIREBASE_STORAGE_BUCKET
          value: alertaya-1b963.firebasestorage.app
        - name: GLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: alertaya-glm-api-key
              key: latest
        resources:
          limits:
            memory: 512Mi
            cpu: "1"

      # Container 2: Redis Cache (Sidecar)
      - name: redis
        image: redis:7-alpine
        resources:
          limits:
            memory: 256Mi
            cpu: "0.5"
