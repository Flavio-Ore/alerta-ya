apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: alertaya-ml
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "20"
    spec:
      containers:
      - name: alertaya-ml-1
        image: us-central1-docker.pkg.dev/alertaya-1b963/cloud-run-source-deploy/alertaya-ml:latest
        ports:
        - containerPort: 8080
        env:
        - name: ENVIRONMENT
          value: production
        - name: VERIFIER_MODEL_PATH
          value: src/models/verifier_v1.joblib
        - name: PREDICTOR_MODEL_PATH
          value: src/models/predictor_v1.joblib
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: alertaya-db-url
              key: latest
        resources:
          limits:
            memory: 512Mi
            cpu: "1"
