# AlertaYa — Docker Compose para producción (GCP VM)
# Servicios: postgres, redis, api, ml, web

version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: alertaya-postgres
    environment:
      POSTGRES_USER: alertaya
      POSTGRES_PASSWORD: alertaya
      POSTGRES_DB: alertaya_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U alertaya -d alertaya_prod']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: alertaya-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: alertaya-api
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://alertaya:alertaya@postgres:5432/alertaya_prod
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml:8000
    env_file:
      - ./api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: alertaya-ml
    environment:
      ENVIRONMENT: production
      PORT: 8000
      DATABASE_URL: postgresql://alertaya:alertaya@postgres:5432/alertaya_prod
      API_URL: http://api:3000
    env_file:
      - ./ml/.env
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: alertaya-web
    ports:
      - '5173:5173'
    depends_on:
      - api

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: alertaya-tunnel
    restart: always
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  redis_data:
