name: CI — ML Service

on:
  push:
    branches: [main]
    paths:
      - 'ml/**'
      - '.github/workflows/ci-ml.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ml/**'

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - run: uv pip install --system flake8
      - run: flake8 src --max-line-length=100 --exclude=src/models/

  test:
    name: Pytest
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - run: uv pip install --system -r requirements.txt
      - run: pytest --tb=short
