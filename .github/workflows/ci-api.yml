name: CI — API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/ci-api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: alertaya
          POSTGRES_PASSWORD: alertaya
          POSTGRES_DB: alertaya_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://alertaya:alertaya@localhost:5432/alertaya_test
      REDIS_URL: redis://localhost:6379
      FIREBASE_PROJECT_ID: test-project
      FIREBASE_CLIENT_EMAIL: test@test.iam.gserviceaccount.com
      FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\ntest\n-----END PRIVATE KEY-----\n"
      GCS_BUCKET_NAME: test-bucket
      GCP_PROJECT_ID: test-project
      JWT_SECRET: test-secret-key-minimo-32-caracteres-aqui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm test

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t alertaya-api:ci ./api
