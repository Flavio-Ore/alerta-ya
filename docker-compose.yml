# AlertaYa — Docker Compose para desarrollo local
# Servicios: postgres, redis, api, ml, web

version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: alertaya-postgres
    environment:
      POSTGRES_USER: alertaya
      POSTGRES_PASSWORD: alertaya
      POSTGRES_DB: alertaya_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U alertaya -d alertaya_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: alertaya-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: alertaya-api
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://alertaya:alertaya@postgres:5432/alertaya_dev
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml:8000
      WEB_URL: http://localhost:5173
    env_file:
      - ./api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api/src:/app/src  # Hot reload en desarrollo

  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: alertaya-ml
    ports:
      - '8000:8000'
    environment:
      ENVIRONMENT: development
      PORT: 8000
      DATABASE_URL: postgresql://alertaya:alertaya@postgres:5432/alertaya_dev
      API_URL: http://api:3000
    env_file:
      - ./ml/.env
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: alertaya-web
    ports:
      - '5173:5173'
    environment:
      VITE_API_BASE_URL: http://localhost:3000
      VITE_WS_URL: ws://localhost:3000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
